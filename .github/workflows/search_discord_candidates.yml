name: Find Discord Candidates

on:
  workflow_dispatch:

jobs:
  find_candidates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Discord candidate finder
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python -u search_discord_candidates.py

      - name: Upload results CSV
        uses: actions/upload-artifact@v4
        with:
          name: discord-candidates
          path: discord_candidates.csv
          retention-days: 30
