name: Scrape Discord Discovery

on:
  workflow_dispatch: {}

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium

      - name: Run Discord discovery scraper
        run: python -u scrape_discord_discovery.py

      - name: Upload results CSV
        uses: actions/upload-artifact@v4
        with:
          name: discord-discovery
          path: discord_discovery.csv
          retention-days: 30
