name: Extract Discord Invite Codes

on:
  workflow_dispatch: {}

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run invite extractor
        run: python -u extract_invites.py

      - name: Upload results CSV
        uses: actions/upload-artifact@v4
        with:
          name: extracted-invites
          path: extracted_invites.csv
          retention-days: 30
